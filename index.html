<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Luck Payment</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
        }

        p {
            margin: 15px 0;
            font-size: 18px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #00ffcc;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 ₹10 Good Luck Website 🍀</h1>
        <p>Pay ₹10 and attract good luck into your life!</p>

        <button onclick="goToQR()">Pay Now</button>
    </div>

    <script>
        function goToQR() {
            // Redirect to QR page
            window.location.href = "qr.html";
        }
    </script>

</body>
</html>
