<!DOCTYPE html>
<html>
<head>
  <title>Food Store</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #fff8f0;
    }

    nav {
      background: #ff5722;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 15px;
      text-decoration: none;
      font-size: 18px;
    }

    .hero {
      text-align: center;
      padding: 50px;
      background: #ffe0b2;
    }

    .hero h1 {
      color: #e64a19;
    }

    .food-section {
      padding: 20px;
      text-align: center;
    }

    .card {
      display: inline-block;
      background: white;
      margin: 15px;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #ff5722;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    footer {
      background: #ff5722;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

<nav>
  <a href="#">Home</a>
  <a href="#menu">Menu</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">
  <h1>Welcome to Anju Food Store 🍕</h1>
  <p>Delicious food at your doorstep</p>
</div>

<div class="food-section" id="menu">
  <h2>Our Menu</h2>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Pizza</h3>
    <p>₹199</p>
    <button>Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Burger</h3>
    <p>₹99</p>
    <button>Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Pasta</h3>
    <p>₹149</p>
    <button>Order Now</button>
  </div>

</div>

<div class="food-section" id="contact">
  <h2>Contact Us</h2>
  <p>📞 Mobile: <b>9876543210</b></p>
  <p>📍 Location: Your City</p>
</div>

<footer>
  <p>© 2026 Anju Food Store</p>
</footer>

</body>
</html>
