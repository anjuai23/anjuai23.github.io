<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
            padding: 50px;
        }

        .game-box {
            background: rgba(0,0,0,0.5);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #ff9800;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-box">
        <h2>🎯 Guess the Number</h2>
        <p>Guess a number between <b>1 and 100</b></p>

        <input type="number" id="guessInput" placeholder="Enter number">
        <br>

        <button onclick="checkGuess()">Submit</button>
        <button onclick="resetGame()">Restart</button>

        <p id="message"></p>
        <p id="attempts"></p>
    </div>

    <script>
        // Generate random number
        let randomNumber = Math.floor(Math.random() * 100) + 1;

        // Set attempts limit
        let attemptsLeft = 7;

        function checkGuess() {
            let userGuess = document.getElementById("guessInput").value;
            let message = document.getElementById("message");
            let attempts = document.getElementById("attempts");

            if (userGuess === "") {
                message.innerText = "⚠️ Please enter a number!";
                return;
            }

            userGuess = Number(userGuess);

            attemptsLeft--;

            if (userGuess === randomNumber) {
                message.innerText = "🎉 Correct! You guessed the number!";
                disableGame();
            } 
            else if (userGuess > randomNumber) {
                message.innerText = "📉 Too high!";
            } 
            else {
                message.innerText = "📈 Too low!";
            }

            attempts.innerText = "Attempts left: " + attemptsLeft;

            if (attemptsLeft === 0 && userGuess !== randomNumber) {
                message.innerText = "❌ Game Over! Number was " + randomNumber;
                disableGame();
            }
        }

        function disableGame() {
            document.getElementById("guessInput").disabled = true;
        }

        function resetGame() {
            randomNumber = Math.floor(Math.random() * 100) + 1;
            attemptsLeft = 7;

            document.getElementById("guessInput").disabled = false;
            document.getElementById("guessInput").value = "";
            document.getElementById("message").innerText = "";
            document.getElementById("attempts").innerText = "";
        }
    </script>

</body>
</html>
