<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Products</h1>
<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart 🛒</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section>

<div class="card">
<h3>Wooden Craft</h3>
<p>₹500</p>
<button onclick="addToCart('Wooden Craft',500)">Add to Cart</button>
</div>

<div class="card">
<h3>Handmade Jewelry</h3>
<p>₹300</p>
<button onclick="addToCart('Jewelry',300)">Add to Cart</button>
</div>

<div class="card">
<h3>Decor Item</h3>
<p>₹700</p>
<button onclick="addToCart('Decor',700)">Add to Cart</button>
</div>

</section>

<script>
function addToCart(name, price){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart!");
}
</script>

</body>
</html>
