<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Pay</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: white;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        img {
            width: 250px;
            margin-top: 20px;
            border-radius: 10px;
            border: 3px solid white;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #00ffcc;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📲 Scan & Pay ₹10</h1>
        <p>Use any UPI app to scan the QR code</p>

        <img src="qranju.png" alt="QR Code">

        <br>
        <a href="index.html">⬅ Go Back</a>
    </div>

</body>
</html>
